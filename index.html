<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book &amp; Notes Vault</title>

  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  
</head>

<body>
  
  <header class="app-header">
    <h1>Book &amp; Notes Vault</h1>
  </header>

  <!-- Tabs: each button shows one section -->
  <nav class="tabs" aria-label="Main sections">
    <button class="tab" type="button" data-target="about" aria-current="true">About</button>
    <button class="tab" type="button" data-target="dashboard">Dashboard</button>
    <button class="tab" type="button" data-target="records">Records</button>
    <button class="tab" type="button" data-target="add-edit">Add / Edit</button>
    <button class="tab" type="button" data-target="settings">Settings</button>
  </nav>

  <main id="main">

    <section id="about" class="panel" aria-labelledby="about-heading">
      <h2 id="about-heading">About</h2>
      </section>

    <section id="dashboard" class="panel" aria-labelledby="dashboard-heading" hidden>
      <h2 id="dashboard-heading">Dashboard</h2>
      </section>

    <section id="records" class="panel" aria-labelledby="records-heading" hidden>
      <h2 id="records-heading">Records</h2>
      </section>

    <section id="add-edit" class="panel" aria-labelledby="add-edit-heading" hidden>
      <h2 id="add-edit-heading">Add a book</h2>
      </section>
    
    <section id="settings" class="panel" aria-labelledby="settings-heading" hidden>
      <h2 id="settings-heading">Settings</h2>
      </section>

  </main>

  <footer class="app-footer">
    <p>Built by lnjoroge-alu -
      <a href="https://github.com/lnjoroge-alu/alu-fwd-summative">Project repo</a>
    </p>
  </footer>

  <script src="scripts/app.js"></script>

</body>
</html>
